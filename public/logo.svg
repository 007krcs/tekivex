<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none" role="img" aria-label="tekivex logo">
  <title>tekivex</title>
  <defs>
    <!-- Hex fill gradient: indigo to cyan, top-left to bottom-right -->
    <linearGradient id="hexGrad" x1="4" y1="7.8" x2="60" y2="56.2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Wordmark gradient: indigo to cyan, horizontal across text -->
    <linearGradient id="wordGrad" x1="78" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Subtle drop shadow for hex icon -->
    <filter id="hexShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════ ICON ═══════════════════════════════ -->
  <!-- Flat-top hexagon, center (32,32), radius 28 -->
  <polygon
    points="60,32 46,56.2 18,56.2 4,32 18,7.8 46,7.8"
    fill="url(#hexGrad)"
    filter="url(#hexShadow)"
  />

  <!-- T crossbar (horizontal bar) -->
  <rect x="14" y="22" width="36" height="5.5" rx="2.75" fill="white"/>

  <!-- T stem (vertical bar) -->
  <rect x="29.25" y="27.5" width="5.5" height="18" rx="2.75" fill="white"/>

  <!-- Data-row dots (right side, suggesting grid rows) -->
  <circle cx="43" cy="24.75" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="43" cy="33"    r="2.5" fill="white" opacity="0.5"/>
  <circle cx="43" cy="41"    r="2.5" fill="white" opacity="0.3"/>

  <!-- ═══════════════════════════════ WORDMARK ═══════════════════════════ -->
  <!-- "tekivex" — bold, gradient, for DARK backgrounds -->
  <text
    x="78"
    y="41"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30"
    font-weight="800"
    fill="url(#wordGrad)"
    letter-spacing="-0.5"
  >tekivex</text>
</svg>
