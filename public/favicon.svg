<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="13" fill="url(#grad)"/>

  <!-- ── T ──────────────────────────────────────────────────── -->
  <!-- Top crossbar -->
  <rect x="7" y="14" width="23" height="6" rx="3" fill="white"/>
  <!-- Stem -->
  <rect x="15.5" y="14" width="6" height="23" rx="3" fill="white"/>

  <!-- ── X ──────────────────────────────────────────────────── -->
  <!-- Diagonal: top-left → bottom-right -->
  <line x1="35" y1="14" x2="57" y2="37" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Diagonal: top-right → bottom-left -->
  <line x1="57" y1="14" x2="35" y2="37" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- ── Accent bar ─────────────────────────────────────────── -->
  <!-- Full track (dim) -->
  <rect x="7" y="47" width="50" height="3.5" rx="1.75" fill="white" opacity="0.18"/>
  <!-- Active segment (blue glow) -->
  <rect x="7" y="47" width="22" height="3.5" rx="1.75" fill="#93c5fd"/>
</svg>
