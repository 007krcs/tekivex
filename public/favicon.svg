<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Front face: blue → violet -->
    <linearGradient id="gf" x1="5" y1="18" x2="45" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Top face: sky blue highlight -->
    <linearGradient id="gt" x1="5" y1="10" x2="55" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <!-- Right face: deep shadow -->
    <linearGradient id="gr" x1="45" y1="10" x2="55" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="gs" x1="5" y1="18" x2="30" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Top face (light) ──────────────────────────── -->
  <polygon points="5,18 45,18 55,10 15,10" fill="url(#gt)"/>

  <!-- ── Right face (dark/shadow) ─────────────────── -->
  <polygon points="45,18 55,10 55,44 45,52" fill="url(#gr)"/>

  <!-- ── Front face (main) ─────────────────────────── -->
  <polygon points="5,18 45,18 45,52 5,52" fill="url(#gf)"/>

  <!-- Subtle shine on front face (top-left quadrant) -->
  <polygon points="5,18 45,18 45,52 5,52" fill="url(#gs)"/>

  <!-- Edge lines for depth -->
  <polyline points="5,52 5,18 15,10 55,10 55,44 45,52 5,52"
            stroke="rgba(0,0,0,0.22)" stroke-width="0.6" fill="none"/>
  <line x1="45" y1="18" x2="45" y2="52" stroke="rgba(0,0,0,0.22)" stroke-width="0.6"/>
  <line x1="5"  y1="18" x2="45" y2="18" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <line x1="15" y1="10" x2="45" y2="18" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>

  <!-- Top face highlight band -->
  <polygon points="5,18 45,18 55,10 15,10" fill="white" opacity="0.16"/>

  <!-- ── T on front face ──────────────────────────── -->
  <!-- T crossbar -->
  <rect x="8" y="23" width="16" height="4.5" rx="2" fill="white"/>
  <!-- T stem -->
  <rect x="13" y="23" width="5" height="16" rx="2" fill="white"/>

  <!-- ── X on front face ──────────────────────────── -->
  <line x1="30" y1="23" x2="43" y2="39" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="43" y1="23" x2="30" y2="39" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Corner accent on top-right edge (subtle glint) -->
  <line x1="45" y1="18" x2="55" y2="10" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
</svg>
