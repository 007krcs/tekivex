<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="tekivex favicon">
  <title>tekivex</title>
  <defs>
    <!-- Hex fill gradient: indigo to cyan, scaled to 32x32 viewBox -->
    <linearGradient id="hexGrad" x1="2" y1="3.9" x2="30" y2="28.1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Light shadow, kept subtle at small size -->
    <filter id="hexShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════ ICON (32x32) ════════════════════════ -->
  <!-- Flat-top hexagon scaled to 32x32: center (16,16), radius 14 -->
  <!-- All coordinates halved from the 64x64 logo-icon spec -->
  <polygon
    points="30,16 23,28.1 9,28.1 2,16 9,3.9 23,3.9"
    fill="url(#hexGrad)"
    filter="url(#hexShadow)"
  />

  <!-- T crossbar — halved from 64x64 spec -->
  <rect x="7" y="11" width="18" height="2.75" rx="1.375" fill="white"/>

  <!-- T stem — halved from 64x64 spec -->
  <rect x="14.625" y="13.75" width="2.75" height="9" rx="1.375" fill="white"/>

  <!-- Data-row dots — halved, opacity boosted slightly for small-size legibility -->
  <circle cx="21.5" cy="12.375" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="21.5" cy="16.5"   r="1.5" fill="white" opacity="0.55"/>
  <circle cx="21.5" cy="20.5"   r="1.5" fill="white" opacity="0.35"/>
</svg>
